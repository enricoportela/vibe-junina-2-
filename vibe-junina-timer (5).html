<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIBE JUNINA – Desafio dos 10 Segundos</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Lilita+One&family=Patrick+Hand+SC&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --red:    #E8191A;
    --green:  #1DB83A;
    --blue:   #1565C0;
    --yellow: #F9C200;
    --black:  #111111;
    --white:  #FAFAFA;
    --cream:  #FFF8E7;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--cream);
    font-family: 'Fredoka One', cursive;
    user-select: none;
  }

  /* ========== BACKGROUND ========== */
  #bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      repeating-linear-gradient(45deg, rgba(249,194,0,.08) 0px, rgba(249,194,0,.08) 2px, transparent 2px, transparent 20px),
      repeating-linear-gradient(-45deg, rgba(229,57,53,.06) 0px, rgba(229,57,53,.06) 2px, transparent 2px, transparent 20px),
      var(--cream);
  }

  /* ========== BANDEIRINHAS ========== */
  .bandeiras {
    position: fixed; top: 0; left: 0; width: 100%;
    z-index: 10; pointer-events: none;
    display: flex; align-items: flex-start;
  }
  .bandeiras svg { width: 100%; height: 80px; }

  .bandeiras-bottom {
    top: auto; bottom: 0;
    transform: rotate(180deg);
  }

  /* ========== ESTRELAS DECORATIVAS ========== */
  .star-deco {
    position: fixed; pointer-events: none; z-index: 5;
    font-size: 2rem; animation: twinkle 2s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100%{opacity:1;transform:scale(1) rotate(0deg);}
    50%{opacity:.4;transform:scale(1.3) rotate(20deg);}
  }

  /* ========== LAYOUT PRINCIPAL ========== */
  #app {
    position: relative; z-index: 20;
    width: 100vw; height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: clamp(8px, 1.5vh, 20px);
    padding: 90px 20px 80px;
  }

  /* ========== LOGO TEXT ========== */
  .logo-text {
    display: flex; flex-direction: column; align-items: center; line-height: 1;
    filter: drop-shadow(3px 3px 0 var(--black));
    animation: logoFloat 3s ease-in-out infinite;
  }
  @keyframes logoFloat {
    0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);}
  }
  .logo-text .vibe {
    font-family: 'Lilita One', cursive;
    font-size: clamp(2.5rem, 7vw, 5.5rem);
    letter-spacing: 4px;
  }
  .logo-text .junina {
    font-family: 'Lilita One', cursive;
    font-size: clamp(2.2rem, 6vw, 4.8rem);
    letter-spacing: 6px;
    margin-top: -8px;
  }
  /* colored letters */
  .v{color:var(--green);}
  .i{color:var(--red);}
  .b{color:var(--blue);}
  .e{color:var(--yellow);}
  .j{color:var(--red);}
  .u{color:var(--yellow);}
  .n{color:var(--green);}
  .ii{color:var(--blue);}
  .n2{color:var(--red);}
  .a{color:var(--yellow);}
  /* stroke */
  .logo-text span { -webkit-text-stroke: 2.5px var(--black); }

  /* ========== SUBTITLE ========== */
  .subtitle {
    font-family: 'Lilita One', cursive;
    font-size: clamp(1rem, 2.8vw, 1.8rem);
    color: var(--black);
    background: var(--yellow);
    border: 3px solid var(--black);
    border-radius: 50px;
    padding: 6px 28px;
    text-align: center;
    box-shadow: 4px 4px 0 var(--black);
    letter-spacing: 1px;
  }

  /* ========== TIMER BOX ========== */
  #timer-box {
    position: relative;
    background: var(--white);
    border: 5px solid var(--black);
    border-radius: 28px;
    padding: clamp(12px, 2.5vh, 30px) clamp(30px, 6vw, 80px);
    box-shadow: 8px 8px 0 var(--black);
    text-align: center;
    min-width: 280px;
    transition: background 0.2s;
  }
  #timer-box.running { background: #e8f5e9; }
  #timer-box.win     { background: #fff9c4; animation: winPulse .4s ease-in-out infinite alternate; }
  #timer-box.lose    { background: #ffebee; animation: losePulse .3s ease-in-out infinite alternate; }

  @keyframes winPulse  { from{transform:scale(1);}  to{transform:scale(1.03);} }
  @keyframes losePulse { from{transform:scale(1);}  to{transform:scale(1.02) rotate(-1deg);} }

  #timer-display {
    font-family: 'Lilita One', cursive;
    font-size: clamp(4rem, 14vw, 10rem);
    color: var(--black);
    line-height: 1;
    letter-spacing: -2px;
    transition: color .1s;
  }
  #timer-display.win-color  { color: var(--green); }
  #timer-display.lose-color { color: var(--red); }

  #timer-ms {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.5rem, 4vw, 3rem);
    color: #555;
    margin-top: -10px;
  }

  /* ========== STATUS MESSAGE ========== */
  #status-msg {
    font-family: 'Lilita One', cursive;
    font-size: clamp(1.1rem, 3vw, 2rem);
    min-height: 2.5rem;
    text-align: center;
    color: var(--black);
    transition: all .2s;
  }
  #status-msg.win-msg  { color: var(--green); }
  #status-msg.lose-msg { color: var(--red); }

  /* ========== RESET BTN ========== */
  #reset-ranking-btn {
    background: transparent;
    border: 1px solid rgba(150,150,150,0.25);
    border-radius: 8px; padding: 3px 8px;
    font-family: 'Fredoka One', cursive;
    font-size: 0.6rem; color: rgba(150,150,150,0.3);
    cursor: pointer; transition: all 0.2s; letter-spacing: 1px;
    vertical-align: middle;
  }
  #reset-ranking-btn:hover {
    color: rgba(200,50,50,0.8);
    border-color: rgba(200,50,50,0.5);
    background: rgba(200,50,50,0.07);
  }

  /* ========== ENTER HINT ========== */
  #enter-hint {
    display: flex; align-items: center; gap: 10px;
    background: var(--black); color: var(--white);
    border-radius: 50px; padding: 8px 22px;
    font-size: clamp(.85rem, 2vw, 1.1rem);
    box-shadow: 3px 3px 0 var(--blue);
  }
  .kbd {
    background: var(--white); color: var(--black);
    border-radius: 8px; padding: 2px 10px;
    font-family: 'Lilita One', cursive;
    font-size: 1em; border: 2px solid #555;
    box-shadow: 0 3px 0 #333;
  }

  /* ========== RANKING ========== */
  #ranking-section {
    width: 100%;
    max-width: 580px;
  }
  .ranking-title {
    font-family: 'Lilita One', cursive;
    font-size: clamp(1rem, 2.5vw, 1.6rem);
    text-align: center;
    color: var(--black);
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  #ranking-list {
    display: flex; flex-direction: column; gap: 6px;
  }
  .rank-item {
    display: flex; align-items: center; gap: 12px;
    background: var(--white);
    border: 3px solid var(--black);
    border-radius: 16px;
    padding: 8px 16px;
    box-shadow: 4px 4px 0 var(--black);
    animation: rankIn .4s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes rankIn {
    from{opacity:0;transform:translateX(-30px);}
    to{opacity:1;transform:translateX(0);}
  }
  .rank-medal {
    font-size: clamp(1.4rem, 3vw, 2rem);
    min-width: 36px; text-align: center;
  }
  .rank-pos {
    font-family: 'Lilita One', cursive;
    font-size: clamp(1rem, 2.5vw, 1.4rem);
    color: var(--black); min-width: 30px;
  }
  .rank-name {
    font-family: 'Lilita One', cursive;
    font-size: clamp(.95rem, 2.2vw, 1.3rem);
    flex: 1; color: #222;
  }
  .rank-time {
    font-family: 'Patrick Hand SC', cursive;
    font-size: clamp(.9rem, 2vw, 1.2rem);
    color: #555;
  }
  .rank-winner-badge {
    background: var(--yellow);
    border: 2px solid var(--black);
    border-radius: 20px;
    padding: 2px 10px;
    font-family: 'Lilita One', cursive;
    font-size: .75rem;
    color: var(--black);
  }

  /* ========== MODAL INPUT NOME ========== */
  #modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,.65);
    display: none; align-items: center; justify-content: center;
  }
  #modal-overlay.show { display: flex; }
  #modal-box {
    background: var(--cream);
    border: 5px solid var(--black);
    border-radius: 28px;
    padding: 36px 40px;
    text-align: center;
    box-shadow: 10px 10px 0 var(--black);
    animation: modalIn .35s cubic-bezier(.34,1.56,.64,1);
    max-width: 440px; width: 90%;
  }
  @keyframes modalIn {
    from{opacity:0;transform:scale(.7);}
    to{opacity:1;transform:scale(1);}
  }
  #modal-emoji { font-size: 3.5rem; }
  #modal-title {
    font-family: 'Lilita One', cursive;
    font-size: 1.8rem; margin: 10px 0 6px;
    color: var(--black);
  }
  #modal-sub {
    font-family: 'Fredoka One', cursive;
    font-size: 1rem; color: #444; margin-bottom: 18px;
  }
  #name-input {
    width: 100%; padding: 12px 16px;
    font-family: 'Lilita One', cursive;
    font-size: 1.3rem;
    border: 3px solid var(--black);
    border-radius: 14px;
    background: var(--white);
    outline: none;
    text-align: center;
    box-shadow: 3px 3px 0 var(--black);
  }
  #name-input:focus { border-color: var(--blue); }
  #confirm-btn {
    margin-top: 14px;
    padding: 12px 36px;
    background: var(--green);
    color: var(--white);
    font-family: 'Lilita One', cursive;
    font-size: 1.3rem;
    border: 3px solid var(--black);
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 4px 4px 0 var(--black);
    transition: transform .1s, box-shadow .1s;
  }
  #confirm-btn:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--black); }
  #confirm-btn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--black); }

  /* ========== ALARM OVERLAY ========== */
  #alarm-overlay {
    position: fixed; inset: 0; z-index: 90;
    pointer-events: none;
    display: none;
  }
  #alarm-overlay.show { display: block; }
  .alarm-flash {
    position: absolute; inset: 0;
    background: var(--yellow);
    animation: flashAnim .25s ease-in-out 6 alternate;
  }
  @keyframes flashAnim {
    from{opacity:0;} to{opacity:.55;}
  }
  .alarm-confetti-wrap {
    position: absolute; inset: 0;
    overflow: hidden;
  }
  .confetti-piece {
    position: absolute;
    width: 12px; height: 12px;
    border-radius: 2px;
    animation: confettiFall 2.5s ease-in forwards;
  }
  @keyframes confettiFall {
    0%  { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100%{ transform: translateY(110vh)  rotate(720deg); opacity: 0; }
  }
  .alarm-text {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    font-family: 'Lilita One', cursive;
    font-size: clamp(3rem, 10vw, 7rem);
    color: var(--black);
    text-shadow: 6px 6px 0 var(--yellow), -3px -3px 0 var(--red);
    text-align: center;
    white-space: nowrap;
    animation: bigPop .4s cubic-bezier(.34,1.56,.64,1);
    line-height: 1.2;
  }
  @keyframes bigPop {
    from{opacity:0;transform:translate(-50%,-50%) scale(.3);}
    to{opacity:1;transform:translate(-50%,-50%) scale(1);}
  }

  /* ========== PARTICLES ========== */
  .star-particle {
    position: fixed; pointer-events: none; z-index: 80;
    font-size: 1.5rem;
    animation: starFloat 1.8s ease-out forwards;
  }
  @keyframes starFloat {
    0%  { opacity:1; transform: translateY(0) scale(1); }
    100%{ opacity:0; transform: translateY(-120px) scale(.3); }
  }

  /* ========== RESPONSIVE ========== */
  @media (max-height: 600px) {
    .logo-text .vibe  { font-size: 2rem; }
    .logo-text .junina{ font-size: 1.8rem; }
    #timer-display    { font-size: 5rem; }
  }
</style>
</head>
<body>

<!-- BACKGROUND -->
<div id="bg"></div>

<!-- BANDEIRINHAS TOPO -->
<div class="bandeiras" id="flags-top"></div>
<!-- BANDEIRINHAS RODAPÉ -->
<div class="bandeiras bandeiras-bottom" id="flags-bottom"></div>

<!-- ESTRELAS DECO -->
<div id="stars-deco"></div>

<!-- APP -->
<div id="app">

  <!-- LOGO -->
  <div class="logo-text" aria-label="VIBE JUNINA">
    <div class="vibe">
      <span class="v">V</span><span class="i">I</span><span class="b">B</span><span class="e">E</span>
    </div>
    <div class="junina">
      <span class="j">J</span><span class="u">U</span><span class="n">N</span><span class="ii">I</span><span class="n2">N</span><span class="a">A</span>
    </div>
  </div>

  <!-- SUBTITLE -->
  <div class="subtitle">🎯 DESAFIO DOS 10 SEGUNDOS EXATOS 🎯</div>

  <!-- TIMER BOX -->
  <div id="timer-box">
    <div id="timer-display">00</div>
    <div id="timer-ms">.000</div>
  </div>

  <!-- STATUS -->
  <div id="status-msg">Pressione ENTER para começar!</div>

  <!-- ENTER HINT -->
  <div id="enter-hint">
    <span class="kbd">ENTER</span>
    <span>iniciar &amp; parar</span>
  </div>

  <!-- RANKING -->
  <div id="ranking-section">
    <div class="ranking-title">🏆 RANKING — TOP 3 🏆 <button id="reset-ranking-btn" onclick="resetRanking()">⚙ reset</button></div>
    <div id="ranking-list">
      <div class="rank-item" id="rank-1"><span class="rank-medal">🥇</span><span class="rank-pos">1º</span><span class="rank-name">—</span><span class="rank-time">–</span></div>
      <div class="rank-item" id="rank-2"><span class="rank-medal">🥈</span><span class="rank-pos">2º</span><span class="rank-name">—</span><span class="rank-time">–</span></div>
      <div class="rank-item" id="rank-3"><span class="rank-medal">🥉</span><span class="rank-pos">3º</span><span class="rank-name">—</span><span class="rank-time">–</span></div>
    </div>
  </div>

</div>

<!-- ALARM OVERLAY -->
<div id="alarm-overlay">
  <div class="alarm-flash"></div>
  <div class="alarm-confetti-wrap" id="confetti-wrap"></div>
  <div class="alarm-text" id="alarm-text"></div>
</div>

<!-- MODAL NOME -->
<div id="modal-overlay">
  <div id="modal-box">
    <div id="modal-emoji">🎉</div>
    <div id="modal-title" id="modal-ttl">PARABÉNS!</div>
    <div id="modal-sub" id="modal-sb">Você parou em <strong id="modal-time"></strong>s!<br>Digite seu nome para o ranking:</div>
    <input id="name-input" type="text" placeholder="Seu nome aqui..." maxlength="20" autocomplete="off">
    <br>
    <button id="confirm-btn" onclick="confirmName()">ENTRAR NO RANKING 🏆</button>
  </div>
</div>

<script>
// ======================================================
// BANDEIRINHAS SVG
// ======================================================
function buildFlags(id) {
  const colors = ['#E8191A','#1DB83A','#1565C0','#F9C200','#E8191A','#1DB83A','#1565C0','#F9C200','#E8191A','#1DB83A','#1565C0','#F9C200','#E8191A','#1DB83A','#1565C0','#F9C200'];
  const n = colors.length;
  const w = 100/n;
  let tris = '';
  for(let i=0;i<n;i++){
    const x1=i*w, x2=(i+1)*w, xm=(i+.5)*w;
    tris += `<polygon points="${x1},0 ${x2},0 ${xm},55" fill="${colors[i]}" stroke="#111" stroke-width=".3"/>`;
  }
  const rope = `<line x1="0" y1="0" x2="100" y2="0" stroke="#111" stroke-width=".8" vector-effect="non-scaling-stroke"/>`;
  document.getElementById(id).innerHTML = `<svg viewBox="0 0 100 60" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">${rope}${tris}</svg>`;
}
buildFlags('flags-top');
buildFlags('flags-bottom');

// ======================================================
// ESTRELAS DECORATIVAS
// ======================================================
const starPositions = [
  {top:'12%',left:'3%',delay:'0s',size:'1.8rem'},
  {top:'18%',right:'4%',delay:'.5s',size:'2.2rem'},
  {top:'50%',left:'2%',delay:'1s',size:'1.5rem'},
  {top:'55%',right:'3%',delay:'1.5s',size:'1.8rem'},
  {top:'80%',left:'5%',delay:'.8s',size:'1.6rem'},
  {top:'75%',right:'5%',delay:'.3s',size:'2rem'},
  {top:'30%',left:'7%',delay:'1.2s',size:'1.3rem'},
  {top:'35%',right:'7%',delay:'.7s',size:'1.4rem'},
];
const decoEl = document.getElementById('stars-deco');
starPositions.forEach(s=>{
  const d = document.createElement('div');
  d.className='star-deco';
  d.textContent='✦';
  Object.assign(d.style,{...s,animationDelay:s.delay,fontSize:s.size});
  if(s.right){d.style.right=s.right;d.style.left='auto';}
  decoEl.appendChild(d);
});

// ======================================================
// TIMER LOGIC
// ======================================================
const TARGET = 10000; // 10.000 ms
const TOLERANCE = 0; // 0ms — só 10.000 EXATO ganha
let running = false;
let startTime = null;
let animFrame = null;
let pendingResult = null;

const timerDisplay = document.getElementById('timer-display');
const timerMs     = document.getElementById('timer-ms');
const timerBox    = document.getElementById('timer-box');
const statusMsg   = document.getElementById('status-msg');
const modalOverlay= document.getElementById('modal-overlay');
const nameInput   = document.getElementById('name-input');
const modalTime   = document.getElementById('modal-time');
const alarmOverlay= document.getElementById('alarm-overlay');
const alarmText   = document.getElementById('alarm-text');
const confettiWrap= document.getElementById('confetti-wrap');

// Audio via Web Audio API
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function getAudio(){ if(!audioCtx) audioCtx=new AudioCtx(); return audioCtx; }

function playBeep(freq=880, dur=0.15, type='square', vol=0.4){
  try {
    const ctx=getAudio();
    const o=ctx.createOscillator();
    const g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type=type; o.frequency.setValueAtTime(freq,ctx.currentTime);
    g.gain.setValueAtTime(vol,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    o.start(ctx.currentTime); o.stop(ctx.currentTime+dur+.05);
  }catch(e){}
}

function playWinSound(){
  const notes=[523,659,784,1047];
  notes.forEach((n,i)=>setTimeout(()=>playBeep(n,.18,'sine',.5),i*100));
}
function playLoseSound(){
  playBeep(220,.4,'sawtooth',.3);
  setTimeout(()=>playBeep(180,.4,'sawtooth',.3),150);
}
function playStartSound(){ playBeep(660,.08,'square',.25); }
function playTickSound(){ playBeep(1200,.04,'square',.15); }

// ======================================================
// RENDER TIMER
// ======================================================
function renderTimer(ms){
  const secs = Math.floor(ms/1000);
  const msPart = ms % 1000;
  timerDisplay.textContent = String(secs).padStart(2,'0');
  timerMs.textContent = '.' + String(msPart).padStart(3,'0');
}

// ======================================================
// ANIMATION LOOP
// ======================================================
function loop(){
  const elapsed = Date.now() - startTime;
  renderTimer(Math.min(elapsed, 99999));
  // color warning
  if(elapsed >= 9000 && elapsed < 9500){
    timerDisplay.style.color='#F9C200';
    if(!loop._tick){ loop._tick=true; playTickSound(); }
  } else if(elapsed >= 9500){
    timerDisplay.style.color='#E8191A';
  }
  if(running) animFrame = requestAnimationFrame(loop);
}

// ======================================================
// START
// ======================================================
function startTimer(){
  running = true;
  startTime = Date.now();
  loop._tick = false;
  timerDisplay.style.color = 'var(--black)';
  timerDisplay.classList.remove('win-color','lose-color');
  timerBox.className = 'running';
  statusMsg.textContent = '⏱ CORRA! PARE EM 10 SEGUNDOS!';
  statusMsg.className = '';
  playStartSound();
  animFrame = requestAnimationFrame(loop);
}

// ======================================================
// STOP
// ======================================================
function stopTimer(){
  running = false;
  cancelAnimationFrame(animFrame);
  const elapsed = Date.now() - startTime;
  renderTimer(elapsed);

  const diff = Math.abs(elapsed - TARGET);
  const isWin = diff <= TOLERANCE;

  pendingResult = { elapsed, isWin };

  if(isWin){
    timerDisplay.classList.add('win-color');
    timerBox.className = 'win';
    statusMsg.textContent = '🎉 EXATOS 10 SEGUNDOS! GANHOU!';
    statusMsg.className = 'win-msg';
    playWinSound();
    triggerAlarm(elapsed);
  } else {
    timerDisplay.classList.add('lose-color');
    timerBox.className = 'lose';
    const over = elapsed > TARGET;
    statusMsg.textContent = over ? `😬 Passou! Foram ${(elapsed/1000).toFixed(3)}s` : `😬 Cedo! Foram ${(elapsed/1000).toFixed(3)}s`;
    statusMsg.className = 'lose-msg';
    playLoseSound();
    spawnStarParticles('❌',3);
  }

  // Always ask name for ranking
  setTimeout(()=>openModal(isWin, elapsed), isWin ? 2600 : 800);
}

// ======================================================
// ENTER KEY
// ======================================================
document.addEventListener('keydown', e=>{
  if(e.code==='Enter' || e.key==='Enter'){
    if(modalOverlay.classList.contains('show')) return;
    if(!running) startTimer();
    else stopTimer();
  }
});

// ======================================================
// ALARM
// ======================================================
function triggerAlarm(ms){
  alarmOverlay.classList.add('show');
  alarmText.innerHTML = `🎊 GANHOU! 🎊<br>LEVE O DOBRO!`;
  confettiWrap.innerHTML='';
  const colors=['#E8191A','#1DB83A','#1565C0','#F9C200'];
  for(let i=0;i<80;i++){
    const c=document.createElement('div');
    c.className='confetti-piece';
    c.style.left=Math.random()*100+'%';
    c.style.top='-20px';
    c.style.background=colors[Math.floor(Math.random()*4)];
    c.style.animationDelay=(Math.random()*1)+'s';
    c.style.animationDuration=(1.5+Math.random()*1.5)+'s';
    c.style.borderRadius=Math.random()>.5?'50%':'2px';
    confettiWrap.appendChild(c);
  }
  spawnStarParticles('🌟',12);
  setTimeout(()=>{ alarmOverlay.classList.remove('show'); confettiWrap.innerHTML=''; },2500);
}

// ======================================================
// STAR PARTICLES
// ======================================================
function spawnStarParticles(emoji,n){
  for(let i=0;i<n;i++){
    const s=document.createElement('div');
    s.className='star-particle';
    s.textContent=emoji;
    s.style.left=(20+Math.random()*60)+'%';
    s.style.top=(20+Math.random()*60)+'%';
    s.style.animationDelay=(Math.random()*.5)+'s';
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),2500);
  }
}

// ======================================================
// MODAL
// ======================================================
function openModal(isWin, ms){
  const modalTitle = document.getElementById('modal-title');
  const modalSub   = document.getElementById('modal-sub');
  if(isWin){
    document.getElementById('modal-emoji').textContent='🏆';
    modalTitle.textContent='VOCÊ GANHOU!';
    modalSub.innerHTML=`Parou em <strong>${(ms/1000).toFixed(3)}s</strong> — EXATOS 10 SEGUNDOS!<br>Coloque seu nome no pódio:`;
  } else {
    document.getElementById('modal-emoji').textContent='😅';
    modalTitle.textContent='FOI POR POUCO!';
    modalSub.innerHTML=`Você parou em <strong>${(ms/1000).toFixed(3)}s</strong><br>Quer entrar no ranking?`;
  }
  nameInput.value='';
  modalOverlay.classList.add('show');
  setTimeout(()=>nameInput.focus(),200);
}

nameInput.addEventListener('keydown',e=>{
  if(e.key==='Enter') confirmName();
});

// ======================================================
// RANKING
// ======================================================
let ranking = JSON.parse(localStorage.getItem('vibeJuninaRanking')||'[]');

function confirmName(){
  const name = nameInput.value.trim() || 'Anônimo';
  if(!pendingResult) return;
  const {elapsed, isWin} = pendingResult;
  ranking.push({name, elapsed, isWin});
  // Sort: winners (closest to 10s) first, then closest regardless
  ranking.sort((a,b)=>{
    const da=Math.abs(a.elapsed-TARGET);
    const db=Math.abs(b.elapsed-TARGET);
    return da-db;
  });
  ranking = ranking.slice(0,10);
  localStorage.setItem('vibeJuninaRanking', JSON.stringify(ranking));
  updateRankingUI();
  modalOverlay.classList.remove('show');
  pendingResult=null;
  // Reset for next player
  setTimeout(resetTimer, 500);
}

function updateRankingUI(){
  const medals=['🥇','🥈','🥉'];
  const positions=['rank-1','rank-2','rank-3'];
  positions.forEach((id,i)=>{
    const el=document.getElementById(id);
    const entry=ranking[i];
    if(entry){
      const diff=Math.abs(entry.elapsed-TARGET);
      const isW=diff===0;
      el.innerHTML=`
        <span class="rank-medal">${medals[i]}</span>
        <span class="rank-pos">${i+1}º</span>
        <span class="rank-name">${escHtml(entry.name)}</span>
        ${isW?'<span class="rank-winner-badge">🏆 GANHOU</span>':''}
        <span class="rank-time">${(entry.elapsed/1000).toFixed(3)}s</span>
      `;
    }
  });
}
updateRankingUI();

function resetTimer(){
  timerDisplay.textContent='00';
  timerMs.textContent='.000';
  timerDisplay.style.color='var(--black)';
  timerDisplay.classList.remove('win-color','lose-color');
  timerBox.className='';
  statusMsg.textContent='Pressione ENTER para começar!';
  statusMsg.className='';
  running=false;
}

function escHtml(s){ return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function resetRanking(){
  if(confirm('Zerar o ranking? Isso apaga todos os nomes!')){
    ranking = [];
    localStorage.removeItem('vibeJuninaRanking');
    ['rank-1','rank-2','rank-3'].forEach((id,i)=>{
      const medals=['🥇','🥈','🥉'];
      document.getElementById(id).innerHTML=`<span class="rank-medal">${medals[i]}</span><span class="rank-pos">${i+1}º</span><span class="rank-name">—</span><span class="rank-time">–</span>`;
    });
  }
}
</script>
